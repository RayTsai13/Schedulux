<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- Suppressing Navigation Shell as per "Semantic Shell" Mandate for Transactional/Login Screens -->
<main class="flex-grow flex items-center justify-center px-6 py-12 relative overflow-hidden">
<!-- Subtle PNW Background Accent (Abstract Topography) -->

<path d="M39.9,-65.7C51.2,-58.4,59.5,-46.7,65.8,-34.1C72,-21.5,76.2,-8.1,75.1,4.9C74.1,17.8,67.8,30.3,58.9,40.8C50,51.3,38.5,59.8,25.8,65.4C13.1,71.1,-0.8,73.8,-15.1,71.8C-29.4,69.7,-44.1,62.8,-55.2,52.2C-66.3,41.6,-73.8,27.3,-76.9,12.2C-80,-2.8,-78.7,-18.6,-71.4,-31.8C-64.2,-45,-51,-55.6,-37.7,-61.8C-24.3,-68.1,-10.7,-70.1,2,-73.6C14.7,-77,28.6,-73,39.9,-65.7Z" fill="currentColor" transform="translate(100 100)"></path>

</div>
<div class="z-10 w-full max-w-md">
<!-- Brand Anchor -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-secondary-container mb-6">
<span class="material-symbols-outlined text-on-secondary-container text-3xl" data-icon="nature">nature</span>
</div>
<h1 class="text-3xl font-bold tracking-tight text-primary mb-2">The Modern Naturalist</h1>
<p class="font-body text-on-surface-variant">Welcome back to the hearth.</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-xl p-8 shadow-[0_20px_40px_rgba(27,28,26,0.05)] border border-outline-variant/10">
<form class="space-y-6">
<!-- Email Input -->
<div>
<label class="block text-sm font-semibold font-label text-on-surface-variant mb-2" for="email">Email Address</label>
<div class="relative group">
<input class="w-full bg-surface-container-low border-0 border-b-2 border-outline-variant/30 py-3 px-4 focus:ring-0 focus:border-primary transition-all font-body text-on-surface placeholder-outline" id="email" name="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div>
<div class="flex justify-between items-center mb-2">
<label class="block text-sm font-semibold font-label text-on-surface-variant" for="password">Password</label>
<a class="text-xs font-semibold text-tertiary hover:underline transition-all" href="#">Forgot?</a>
</div>
<div class="relative group">
<input class="w-full bg-surface-container-low border-0 border-b-2 border-outline-variant/30 py-3 px-4 focus:ring-0 focus:border-primary transition-all font-body text-on-surface" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Actions -->
<div class="pt-2">
<button class="w-full bg-primary text-on-primary font-headline font-bold py-4 rounded-lg hover:bg-primary-container transition-all flex items-center justify-center gap-2 group shadow-lg shadow-primary/10 active:scale-[0.98]" type="submit">
                            Sign in
                            <span class="material-symbols-outlined text-lg group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
<div class="relative flex items-center py-4">
<div class="flex-grow border-t border-outline-variant/20"></div>
<span class="flex-shrink mx-4 text-xs font-label text-outline uppercase tracking-widest">or continue with</span>
<div class="flex-grow border-t border-outline-variant/20"></div>
</div>
<!-- Social Login -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center py-3 px-4 bg-surface rounded-lg border border-outline-variant/20 hover:bg-surface-container-low transition-colors font-label font-semibold text-sm text-on-surface-variant" type="button">
<img alt="" class="w-4 h-4 mr-2" data-alt="Google brand logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC5zW95JACzP71tAmcueTv_94M3cwD9NtqwcybtcUMpgNHz1L6wkYl7Oo6-WVIMptTtqPpWjaDZsApNRRwxrjQg3ermPxW8pNdOlLcE0LxUQxwPLCjYFKkCN06GVtOTzYEkdTZeTw2f2aZY6LR15ZWcm_Au3veIWlQYUu3Tkvvqd9qZWKJdvuB0bWUUOOpiCcEsMtlyuEJb60J087kKILfQt3XGitCtMzcw52BV9plOkG5KlbZPN88FkpEUN-tYnVBzIAVMkswV9M0o"/>
                            Google
                        </button>
<button class="flex items-center justify-center py-3 px-4 bg-surface rounded-lg border border-outline-variant/20 hover:bg-surface-container-low transition-colors font-label font-semibold text-sm text-on-surface-variant" type="button">
<span class="material-symbols-outlined text-lg mr-2" data-icon="forest" data-weight="fill" style="font-variation-settings: 'FILL' 1;">forest</span>
                            Naturalist ID
                        </button>
</div>
</form>
</div>
<!-- Bottom Note -->
<div class="mt-8 text-center">
<p class="font-body text-sm text-on-surface-variant">
                    New to the community? 
                    <a class="font-bold text-primary hover:underline underline-offset-4" href="#">Register your plot</a>
</p>
</div>
</div>
</main>
<!-- Footer Fragment (Minimal for Login) -->
<footer class="w-full py-8 px-8 border-t border-outline-variant/15 flex flex-col md:flex-row justify-between items-center gap-4 bg-surface-container-low">
<div class="text-xs font-label text-outline">
            © 2024 The Modern Naturalist. Rooted in the Pacific Northwest.
        </div>
<div class="flex gap-6">
<a class="text-xs font-label text-outline hover:text-tertiary transition-all" href="#">Privacy Policy</a>
<a class="text-xs font-label text-outline hover:text-tertiary transition-all" href="#">Sustainability Pact</a>
<a class="text-xs font-label text-outline hover:text-tertiary transition-all" href="#">Contact Support</a>
</div>
</footer>
