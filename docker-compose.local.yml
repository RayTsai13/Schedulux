services:
  db:
    image: postgres:15-alpine
    container_name: schedulux-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: schedulux_primary
      POSTGRES_USER: schedulux
      POSTGRES_PASSWORD: localdevpassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: schedulux-backend
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: schedulux_primary
      DB_USER: schedulux
      DB_PASSWORD: localdevpassword
      JWT_SECRET: local-dev-secret-change-me
      NODE_ENV: development
      PORT: 3000
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:8080
      FRONTEND_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:3000/api
    container_name: schedulux-frontend
    restart: unless-stopped
    ports:
      - "8080:80"

volumes:
  pgdata:
