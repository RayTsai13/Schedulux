services:
  backend:
    build: ./backend
    container_name: schedulux-backend
    restart: unless-stopped
    env_file: ./backend/.env
    ports:
      - "3000:3000"
    depends_on: []

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-https://yourdomain.com/api}
    container_name: schedulux-frontend
    restart: unless-stopped
    ports:
      - "8080:80"

  caddy:
    image: caddy:2-alpine
    container_name: schedulux-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
